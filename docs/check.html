<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resonance — Build Verification</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 60px 20px; }
        .card { max-width: 500px; margin: 0 auto; border-radius: 12px; padding: 40px 30px; }
        .checking { background: #161b22; border: 2px solid #30363d; }
        .ok { background: #0d3320; border: 2px solid #238636; }
        .fail { background: #3e1a1a; border: 2px solid #e94560; }
        .status { font-size: 1.3em; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .ok .status { background: #238636; color: white; }
        .fail .status { background: #e94560; color: white; }
        .checking .status { background: #21262d; color: #8b949e; }
        a { color: #58a6ff; }
    </style>
</head>
<body>
    <div id="card" class="card checking">
        <h1>Build Verification</h1>
        <div id="status" class="status">Waiting for request...</div>
        <div id="info"></div>
    </div>
    <script>
        const hashes = {
            '0.6.0': 'PUT_HASH_HERE',
            '0.5.3': 'PUT_HASH_HERE',
        };
        const p = new URLSearchParams(location.search);
        const v = p.get('version'), h = p.get('hash');
        const card = document.getElementById('card'), status = document.getElementById('status'), info = document.getElementById('info');
        if (!v || !h) {
            card.className = 'card checking';
            status.textContent = 'Waiting for mod request...';
        } else if (hashes[v] && hashes[v] === h) {
            card.className = 'card ok';
            status.textContent = 'Official Build';
            info.innerHTML = '<p>Model download allowed.</p>';
        } else {
            card.className = 'card fail';
            status.textContent = 'Unofficial Build';
            info.innerHTML = '<p>Code has been modified. AI will not start.</p><p><a href="https://github.com/t21664815-eng/Resonance/releases">Download original</a></p>';
        }
    </script>
</body>
</html>
